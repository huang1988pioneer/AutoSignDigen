name: Digen Daily Reward

on:
  schedule:
    - cron: "6 22 * * *"
  workflow_dispatch:

jobs:
  reward:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Claim Digen daily login reward
        env:
          DIGEN_TOKEN1: ${{ secrets.DIGEN_TOKEN1 }}
        run: npm run api-reward -- token --token-name=DIGEN_TOKEN1

      - name: Summarize reward log
        if: always()
        shell: bash
        run: |
          if compgen -G "logs/*.jsonl" > /dev/null; then
            echo "### Digen reward log" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            tail -n 1 logs/*.jsonl >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reward logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digen-reward-logs-token1
          path: logs/
          if-no-files-found: warn
