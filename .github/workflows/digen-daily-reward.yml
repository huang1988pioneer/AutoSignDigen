name: Digen Daily Reward

on:
  schedule:
    - cron: "6 22 * * *"
  workflow_dispatch:

jobs:
  reward:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Claim Digen daily login reward
        env:
          DIGEN_TOKEN1: ${{ secrets.DIGEN_TOKEN1 }}
        run: npm run api-reward -- token --token-name=DIGEN_TOKEN1
