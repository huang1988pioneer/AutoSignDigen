name: Digen Daily Reward

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  reward:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Claim Digen daily login reward
        env:
          DIGEN_TOKEN: ${{ secrets.DIGEN_TOKEN }}
        run: npm run api-reward -- token
