name: Digen Daily Reward

on:
  schedule:
    - cron: "5 21 * * *"
    - cron: "5 9 * * *"
  workflow_dispatch:

jobs:
  check-token-secrets:
    name: check-token-secrets
    runs-on: ubuntu-latest
    env:
      DIGEN_TOKEN1: ${{ secrets.DIGEN_TOKEN1 }}
      DIGEN_TOKEN2: ${{ secrets.DIGEN_TOKEN2 }}
      DIGEN_TOKEN3: ${{ secrets.DIGEN_TOKEN3 }}
      DIGEN_TOKEN4: ${{ secrets.DIGEN_TOKEN4 }}
      DIGEN_TOKEN5: ${{ secrets.DIGEN_TOKEN5 }}
      DIGEN_TOKEN6: ${{ secrets.DIGEN_TOKEN6 }}
      DIGEN_TOKEN7: ${{ secrets.DIGEN_TOKEN7 }}
      DIGEN_TOKEN8: ${{ secrets.DIGEN_TOKEN8 }}
      DIGEN_TOKEN9: ${{ secrets.DIGEN_TOKEN9 }}
      DIGEN_TOKEN10: ${{ secrets.DIGEN_TOKEN10 }}
      DIGEN_TOKEN11: ${{ secrets.DIGEN_TOKEN11 }}
      DIGEN_TOKEN12: ${{ secrets.DIGEN_TOKEN12 }}
      DIGEN_TOKEN13: ${{ secrets.DIGEN_TOKEN13 }}
      DIGEN_TOKEN14: ${{ secrets.DIGEN_TOKEN14 }}
      DIGEN_TOKEN15: ${{ secrets.DIGEN_TOKEN15 }}
      DIGEN_TOKEN16: ${{ secrets.DIGEN_TOKEN16 }}
      DIGEN_TOKEN17: ${{ secrets.DIGEN_TOKEN17 }}
      DIGEN_TOKEN18: ${{ secrets.DIGEN_TOKEN18 }}
      DIGEN_TOKEN19: ${{ secrets.DIGEN_TOKEN19 }}
      DIGEN_TOKEN20: ${{ secrets.DIGEN_TOKEN20 }}
      DIGEN_TOKEN21: ${{ secrets.DIGEN_TOKEN21 }}
      DIGEN_TOKEN22: ${{ secrets.DIGEN_TOKEN22 }}
      DIGEN_TOKEN23: ${{ secrets.DIGEN_TOKEN23 }}
      DIGEN_TOKEN24: ${{ secrets.DIGEN_TOKEN24 }}
      DIGEN_TOKEN25: ${{ secrets.DIGEN_TOKEN25 }}
      DIGEN_TOKEN26: ${{ secrets.DIGEN_TOKEN26 }}
      DIGEN_TOKEN27: ${{ secrets.DIGEN_TOKEN27 }}
      DIGEN_TOKEN28: ${{ secrets.DIGEN_TOKEN28 }}
      DIGEN_TOKEN29: ${{ secrets.DIGEN_TOKEN29 }}
      DIGEN_TOKEN30: ${{ secrets.DIGEN_TOKEN30 }}
      DIGEN_TOKEN31: ${{ secrets.DIGEN_TOKEN31 }}
      DIGEN_TOKEN32: ${{ secrets.DIGEN_TOKEN32 }}
      DIGEN_TOKEN33: ${{ secrets.DIGEN_TOKEN33 }}
    steps:
      - name: Check configured token values
        shell: bash
        run: |
          configured_count=0
          duplicate_token_found=0
          declare -A token_hashes

          for index in $(seq 1 33); do
            token_name="DIGEN_TOKEN${index}"

            if [ -n "${!token_name}" ]; then
              configured_count=$((configured_count + 1))
              token_hash="$(printf '%s' "${!token_name}" | sha256sum | awk '{print $1}')"

              if [ -n "${token_hashes[$token_hash]:-}" ]; then
                echo "::warning::${token_name} has the same value as ${token_hashes[$token_hash]}."
                duplicate_token_found=1
              else
                token_hashes[$token_hash]="${token_name}"
              fi
            else
              echo "Skipping ${token_name}: secret is not configured."
            fi
          done

          if [ "$configured_count" -eq 0 ]; then
            echo "No DIGEN_TOKEN secrets are configured."
            exit 1
          fi

          echo "Configured DIGEN_TOKEN secret count: ${configured_count}."

          if [ "$duplicate_token_found" -eq 0 ]; then
            echo "No duplicate configured DIGEN_TOKEN values were detected."
          fi

  reward:
    name: checkin-token-${{ matrix.token_index }} - ${{ matrix.account_label }}
    runs-on: ubuntu-latest
    needs: check-token-secrets
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - token_index: 1
            account_label: goldshoot0720
          - token_index: 2
            account_label: abuhg17
          - token_index: 3
            account_label: fengtuprinfo
          - token_index: 4
            account_label: feng33feng35feng3
          - token_index: 5
            account_label: chbondg2
          - token_index: 6
            account_label: huang1988pioneer
          - token_index: 7
            account_label: chbondg_outloook
          - token_index: 8
            account_label: gaokaolevel3iptopscorer_outlook
          - token_index: 9
            account_label: huang1988pioneer_outloook
          - token_index: 10
            account_label: fengtuta_tuta
          - token_index: 11
            account_label: fengfence_fence
          - token_index: 12
            account_label: samafengtu
          - token_index: 13
            account_label: fengtusama
          - token_index: 14
            account_label: fengwithting0831
          - token_index: 15
            account_label: fengwithfeng1127
          - token_index: 16
            account_label: fengwithtu1127
          - token_index: 17
            account_label: akaonda333
          - token_index: 18
            account_label: fbussinesseng
          - token_index: 19
            account_label: engdictatorf
          - token_index: 20
            account_label: flottojackpoteng
          - token_index: 21
            account_label: account21
          - token_index: 22
            account_label: account22
          - token_index: 23
            account_label: account23
          - token_index: 24
            account_label: account24
          - token_index: 25
            account_label: account25
          - token_index: 26
            account_label: account26
          - token_index: 27
            account_label: account27
          - token_index: 28
            account_label: account28
          - token_index: 29
            account_label: account29
          - token_index: 30
            account_label: account30
          - token_index: 31
            account_label: account31
          - token_index: 32
            account_label: account32
          - token_index: 33
            account_label: account33
    env:
      DIGEN_TOKEN: ${{ secrets[format('DIGEN_TOKEN{0}', matrix.token_index)] }}
    steps:
      - name: Skip missing token
        id: token
        shell: bash
        run: |
          if [ -z "$DIGEN_TOKEN" ]; then
            echo "DIGEN_TOKEN${{ matrix.token_index }} (${{ matrix.account_label }}) is not configured; skipping."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.token.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.token.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        if: steps.token.outputs.configured == 'true'
        run: npm ci

      - name: Claim Digen daily login reward
        if: steps.token.outputs.configured == 'true'
        run: npm run api-reward -- token

      - name: Summarize reward log
        if: always()
        shell: bash
        run: |
          if compgen -G "logs/*.jsonl" > /dev/null; then
            echo "### Digen reward log for checkin-token-${{ matrix.token_index }} - ${{ matrix.account_label }}" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            tail -n 1 logs/*.jsonl >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reward logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digen-reward-logs-token${{ matrix.token_index }}-${{ matrix.account_label }}
          path: logs/
          if-no-files-found: ignore
