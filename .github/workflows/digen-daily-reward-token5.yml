name: Digen Daily Reward Token 5

on:
  schedule:
    - cron: "10 2 * * *"
  workflow_dispatch:

jobs:
  reward:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Claim Digen daily login reward for chbondg2
        env:
          DIGEN_TOKEN5: ${{ secrets.DIGEN_TOKEN5 }}
        run: npm run api-reward -- token --token-name=DIGEN_TOKEN5
