name: Check Token Secret Duplicates

on:
  schedule:
    - cron: "35 20 * * *"
  workflow_dispatch:

jobs:
  check-duplicates:
    name: check-token-secret-duplicates
    runs-on: ubuntu-latest
    env:
      DIGEN_TOKEN1: ${{ secrets.DIGEN_TOKEN1 }}
      DIGEN_TOKEN2: ${{ secrets.DIGEN_TOKEN2 }}
      DIGEN_TOKEN3: ${{ secrets.DIGEN_TOKEN3 }}
      DIGEN_TOKEN4: ${{ secrets.DIGEN_TOKEN4 }}
      DIGEN_TOKEN5: ${{ secrets.DIGEN_TOKEN5 }}
      DIGEN_TOKEN6: ${{ secrets.DIGEN_TOKEN6 }}
      DIGEN_TOKEN7: ${{ secrets.DIGEN_TOKEN7 }}
      DIGEN_TOKEN8: ${{ secrets.DIGEN_TOKEN8 }}
      DIGEN_TOKEN9: ${{ secrets.DIGEN_TOKEN9 }}
      DIGEN_TOKEN10: ${{ secrets.DIGEN_TOKEN10 }}
      DIGEN_TOKEN11: ${{ secrets.DIGEN_TOKEN11 }}
      DIGEN_TOKEN12: ${{ secrets.DIGEN_TOKEN12 }}
      DIGEN_TOKEN13: ${{ secrets.DIGEN_TOKEN13 }}
      DIGEN_TOKEN14: ${{ secrets.DIGEN_TOKEN14 }}
      DIGEN_TOKEN15: ${{ secrets.DIGEN_TOKEN15 }}
      DIGEN_TOKEN16: ${{ secrets.DIGEN_TOKEN16 }}
      DIGEN_TOKEN17: ${{ secrets.DIGEN_TOKEN17 }}
      DIGEN_TOKEN18: ${{ secrets.DIGEN_TOKEN18 }}
      DIGEN_TOKEN19: ${{ secrets.DIGEN_TOKEN19 }}
      DIGEN_TOKEN20: ${{ secrets.DIGEN_TOKEN20 }}
    steps:
      - name: Check duplicate token secrets
        shell: bash
        run: |
          configured_count=0
          duplicate_count=0
          declare -A token_hashes

          {
            echo "### Token secret duplicate check"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          for index in $(seq 1 20); do
            secret_name="DIGEN_TOKEN${index}"
            secret_value="${!secret_name}"

            if [ -z "$secret_value" ]; then
              echo "Skipping ${secret_name}: secret is not configured."
              continue
            fi

            configured_count=$((configured_count + 1))
            secret_hash="$(printf '%s' "$secret_value" | sha256sum | awk '{print $1}')"

            if [ -n "${token_hashes[$secret_hash]:-}" ]; then
              echo "::error::${secret_name} has the same value as ${token_hashes[$secret_hash]}."
              echo "- Duplicate: ${secret_name} matches ${token_hashes[$secret_hash]}." >> "$GITHUB_STEP_SUMMARY"
              duplicate_count=$((duplicate_count + 1))
            else
              token_hashes[$secret_hash]="$secret_name"
            fi
          done

          echo "Configured DIGEN_TOKEN secret count: ${configured_count}."
          echo "- Configured token secrets: ${configured_count}" >> "$GITHUB_STEP_SUMMARY"

          if [ "$configured_count" -eq 0 ]; then
            echo "::error::No DIGEN_TOKEN secrets are configured."
            echo "- Result: failed because no DIGEN_TOKEN secrets are configured." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if [ "$duplicate_count" -gt 0 ]; then
            echo "::error::Found ${duplicate_count} duplicate DIGEN_TOKEN secret value(s)."
            echo "- Result: failed because duplicate token secret values were found." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "No duplicate configured DIGEN_TOKEN values were detected."
          echo "- Result: no duplicate configured DIGEN_TOKEN values were detected." >> "$GITHUB_STEP_SUMMARY"
